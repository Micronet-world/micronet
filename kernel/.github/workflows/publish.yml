name: Publish Kernel to npm

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Micronet-world/micronet

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npm run test

      - run: npm publish --access public
        working-directory: kernel
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
